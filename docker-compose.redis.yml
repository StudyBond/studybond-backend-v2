services:
  redis:
    image: redis:7-alpine
    container_name: studybond-redis
    restart: unless-stopped
    ports:
      - target: 6379
        published: 6380
        protocol: tcp
        mode: host
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: studybond-redisinsight
    restart: unless-stopped
    ports:
      - target: 5540
        published: 5540
        protocol: tcp
        mode: host
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redis_insight_data:/data

volumes:
  redis_data:
  redis_insight_data:
